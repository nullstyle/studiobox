name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, lint, and type-check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.9.1
          cache: true
      - name: Check formatting
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type-check
        run: deno check .
      - name: Dependency provenance gate
        run: deno task compat:check
      - name: Wire drift gate
        # Bundle hash + committed-bindings typecheck always run; the
        # regeneration-reproduction leg skips loudly without the
        # ../capnp-deno toolchain checkout (not present in CI).
        run: deno task wire:check

  test:
    name: Test (${{ matrix.os }}, Deno ${{ matrix.deno }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
        deno: [v2.9.x, v2.x]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: ${{ matrix.deno }}
          cache: true
      - name: Run tests
        run: deno task test
