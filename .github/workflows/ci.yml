name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, lint, and type-check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.9.1
          cache: true
      - name: Cache pinned Cap'n Proto build
        id: capnp-cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /tmp/capnp-prefix
          key: capnp-prefix-1.4.0-fa02378ad522b318
      - name: Install checksum-pinned Cap'n Proto
        if: steps.capnp-cache.outputs.cache-hit != 'true'
        env:
          CAPNP_SHA256: fa02378ad522b318916b9ad928d1372fc9abd43dd1f4f0392e50450f5c87828f
          CAPNP_VERSION: 1.4.0
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output /tmp/capnp.tar.gz \
            "https://capnproto.org/capnproto-c++-${CAPNP_VERSION}.tar.gz"
          echo "${CAPNP_SHA256}  /tmp/capnp.tar.gz" | sha256sum --check
          tar --extract --gzip --file=/tmp/capnp.tar.gz --directory=/tmp
          cmake -S "/tmp/capnproto-c++-${CAPNP_VERSION}" \
            -B /tmp/capnp-build \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/capnp-build --target capnp_tool --parallel 2
          # Prefix layout: the compiler resolves standard imports like
          # /capnp/stream.capnp from <bindir>/../include.
          install -D /tmp/capnp-build/src/capnp/capnp /tmp/capnp-prefix/bin/capnp
          mkdir -p /tmp/capnp-prefix/include/capnp/compat
          cp "/tmp/capnproto-c++-${CAPNP_VERSION}/src/capnp/"*.capnp \
            /tmp/capnp-prefix/include/capnp/
          cp "/tmp/capnproto-c++-${CAPNP_VERSION}/src/capnp/compat/"*.capnp \
            /tmp/capnp-prefix/include/capnp/compat/ 2>/dev/null || true
      - name: Add Cap'n Proto to PATH
        run: echo "/tmp/capnp-prefix/bin" >> "$GITHUB_PATH"
      - name: Install capnp standard schemas
        # The compiler's standard import paths are /usr/local/include and
        # /usr/include (compile-time constants, not exe-relative) — the
        # cached prefix layout alone is invisible to it.
        run: |
          sudo mkdir -p /usr/local/include/capnp
          sudo cp -R /tmp/capnp-prefix/include/capnp/. /usr/local/include/capnp/
      - name: Check formatting
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type-check
        run: deno check .
      - name: Dependency provenance gate
        run: deno task compat:check
      - name: Wire drift gate
        # Bundle hash + committed-bindings typecheck always run; the
        # regeneration-reproduction leg skips loudly without the
        # ../capnp-deno toolchain checkout (not present in CI).
        run: deno task wire:check

  test:
    name: Test (${{ matrix.os }}, Deno ${{ matrix.deno }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
        deno: [v2.9.x, v2.x]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: ${{ matrix.deno }}
          cache: true
      - name: Run tests
        run: deno task test
